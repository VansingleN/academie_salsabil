[build]
  command = "npm run build"
  publish = "dist"

[functions]
  directory = "netlify/functions"

# Le front utilise une URL stable et indépendante du fournisseur serverless.
[[redirects]]
  from = "/api/cart-quote"
  to = "/.netlify/functions/validate-cart"
  status = 200

# HashRouter gère déjà les routes du site, mais ce fallback protège les accès directs.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
