[build]
  command = "npm run build"
  publish = "dist"

[functions]
  directory = "netlify/functions"

[[headers]]
  for = "/panier"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"

[[headers]]
  for = "/paiement/*"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"

[[headers]]
  for = "/admin/*"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"

# Les fichiers générés par Vite portent un hash dans leur nom : ils peuvent
# rester en cache durablement sans risque de servir une ancienne version.
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Le front utilise une URL stable et indépendante du fournisseur serverless.
[[redirects]]
  from = "/api/cart-quote"
  to = "/.netlify/functions/validate-cart"
  status = 200

[[redirects]]
  from = "/api/create-checkout-session"
  to = "/.netlify/functions/create-checkout-session"
  status = 200

[[redirects]]
  from = "/api/stripe-webhook"
  to = "/.netlify/functions/stripe-webhook"
  status = 200

[[redirects]]
  from = "/api/verify-checkout-session"
  to = "/.netlify/functions/verify-checkout-session"
  status = 200

[[redirects]]
  from = "/api/create-customer-portal"
  to = "/.netlify/functions/create-customer-portal"
  status = 200

[[redirects]]
  from = "/api/support-requests"
  to = "/.netlify/functions/create-support-request"
  status = 200

[[redirects]]
  from = "/api/contact-messages"
  to = "/.netlify/functions/contact-messages"
  status = 200

[[redirects]]
  from = "/api/admin-orders"
  to = "/.netlify/functions/admin-orders"
  status = 200

[[redirects]]
  from = "/api/admin-export"
  to = "/.netlify/functions/admin-export"
  status = 200

# BrowserRouter nécessite ce fallback pour les accès directs aux routes React.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
